services:
  # ── Backend API ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metro-sewa-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://metro-sewa-user:metro-sewa-password-123@db:5432/metro-sewa-db?schema=public
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - metro-sewa-network
    volumes:
      - ./uploads:/app/uploads

  # ── PostgreSQL Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: metro-sewa-db
    restart: always
    environment:
      POSTGRES_DB: metro-sewa-db
      POSTGRES_USER: metro-sewa-user
      POSTGRES_PASSWORD: metro-sewa-password-123
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U metro-sewa-user -d metro-sewa-db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metro-sewa-network

networks:
  metro-sewa-network:
    driver: bridge

volumes:
  db-data:
