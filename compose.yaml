services:
  app:
    build:
      context: .
      target: final
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://metro-sewa-user:metro-sewa-password-123@db:5432/metro-sewa-db
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: metro-sewa-db
      POSTGRES_USER: metro-sewa-user
      POSTGRES_PASSWORD: metro-sewa-password-123
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U metro-sewa-user -d metro-sewa-db" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
